<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Feeling Game Launcher</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --line:#d9e1ee;
      --ink:#1b2436;
      --sub:#6b778e;
      --accent:#23457a;
      --shadow:0 22px 50px rgba(22,35,61,.10);
      --soft-shadow:0 12px 28px rgba(22,35,61,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:linear-gradient(180deg,#fbfcff 0%,#f4f6fb 100%);color:var(--ink)}
    body{padding:clamp(10px,1.8vw,18px);min-height:100dvh;display:grid;place-items:center;overflow:hidden}
    .launcher{width:min(100%,1500px);height:min(calc(100dvh - 24px),860px);display:grid;grid-template-rows:minmax(0,1fr) auto;gap:10px}
    .frame{background:linear-gradient(180deg,#fdfdff,#f4f7fb);border:1px solid var(--line);border-radius:34px;padding:18px;box-shadow:var(--shadow);min-height:0}
    .viewport{position:relative;height:100%;border-radius:28px;border:1px solid var(--line);background:linear-gradient(180deg,#ffffff,#f8f9fd);overflow:hidden;display:grid;grid-template-rows:minmax(0,1fr)}
    .viewport::after{content:"";position:absolute;left:50%;bottom:10%;width:min(780px,78%);height:54px;transform:translateX(-50%);background:radial-gradient(ellipse at center, rgba(31,49,88,.16), rgba(31,49,88,0) 72%);filter:blur(12px);pointer-events:none}
    .carousel-area{position:relative;min-height:0;height:100%;display:grid;place-items:center;padding:24px 24px 30px}
    .carousel-stage{position:relative;width:100%;height:min(100%,420px);min-height:240px;perspective:1400px}
    .cart{position:absolute;left:50%;top:50%;width:clamp(220px,22vw,360px);height:clamp(170px,17vw,280px);transform-origin:center center;transition:transform .44s cubic-bezier(.2,.72,.12,1), opacity .28s ease, filter .28s ease;will-change:transform,opacity;cursor:pointer;user-select:none}
    .cart-shell{position:relative;width:100%;height:100%;padding:14px 14px 12px;border-radius:26px 26px 20px 20px;background:linear-gradient(180deg,#fbfdff,#eef2f8);border:1px solid #d3dbea;box-shadow:0 24px 42px rgba(24,39,69,.12), inset 0 2px 0 rgba(255,255,255,.94);overflow:hidden}
    .cart-shell::before{content:"";position:absolute;left:50%;top:0;width:96px;height:16px;transform:translateX(-50%);border-radius:0 0 16px 16px;background:linear-gradient(180deg,#dce4ef,#c8d2e1)}
    .cover{position:relative;height:68%;border-radius:18px;border:1px solid rgba(25,40,72,.08);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.42)}
    .cart-meta{position:absolute;left:22px;right:22px;bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .tag{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;background:#eef4ff;border:1px solid #d8e5ff;font-size:.74rem;font-weight:900;color:#335ca8;white-space:nowrap}
    .title{font-size:1.1rem;font-weight:900;line-height:1.16;min-width:0;flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cart.center .cart-shell{box-shadow:0 30px 56px rgba(17,31,56,.16), inset 0 2px 0 rgba(255,255,255,.97);border-color:#b8c8e3}
    .cart.center .title{font-size:1.18rem}
    .bottom-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:0 4px}
    .helper-wrap{display:grid;gap:4px;min-width:min(100%,560px)}
    .helper{color:var(--sub);font-size:.95rem;font-weight:700;letter-spacing:.01em}
    .helper-sub{color:#8190a8;font-size:.82rem;font-weight:700;line-height:1.45}
    .action-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .launch-btn,.folder-btn{font:inherit;font-weight:900;cursor:pointer;transition:transform .16s ease,filter .16s ease,opacity .16s ease}
    .launch-btn{border:0;border-radius:999px;padding:13px 22px;background:linear-gradient(135deg,#15243d,#294877);color:#fff;box-shadow:var(--soft-shadow)}
    .launch-btn:hover,.folder-btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
    .launch-btn:active,.folder-btn:active{transform:translateY(1px)}
    .launch-btn[disabled],.folder-btn[disabled]{opacity:.45;cursor:not-allowed;transform:none;filter:none}
    .folder-btn{border:1px solid #d4deef;border-radius:999px;padding:12px 16px;background:#fff;color:#294877;box-shadow:0 10px 24px rgba(22,35,61,.06)}
    button{font:inherit}

    .cover-road{background:linear-gradient(180deg,#9dd8ff 0 40%, #d8f0ff 40% 48%, #3f566d 48% 100%)}
    .cover-road .sun{position:absolute;right:14px;top:12px;width:36px;height:36px;border-radius:50%;background:#ffd86a}
    .cover-road .road-line{position:absolute;left:50%;bottom:0;width:14px;height:100%;transform:translateX(-50%);background:repeating-linear-gradient(180deg, transparent 0 16px, #fff 16px 30px)}
    .cover-road .car-body{position:absolute;left:28px;bottom:28px;width:108px;height:42px;border-radius:22px 28px 16px 16px;background:#ef9a9a;box-shadow:inset 0 -5px 0 rgba(0,0,0,.14)}
    .cover-road .car-top{position:absolute;left:54px;bottom:56px;width:54px;height:22px;border-radius:16px 16px 8px 8px;background:#c7f0ff}
    .cover-road .wheel,.cover-road .wheel2{position:absolute;bottom:18px;width:24px;height:24px;border-radius:50%;background:#1f2937;border:5px solid #c8d4e8}
    .cover-road .wheel{left:40px}.cover-road .wheel2{left:104px}

    .cover-ice{background:linear-gradient(180deg,#ffe6ef,#fff1f6 42%,#d9f1ff 42% 100%)}
    .cover-ice .cone{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:0;height:0;border-left:32px solid transparent;border-right:32px solid transparent;border-top:76px solid #d39a5f}
    .cover-ice .scoop1,.cover-ice .scoop2,.cover-ice .scoop3{position:absolute;border-radius:50%;box-shadow:inset 0 -8px 0 rgba(255,255,255,.2)}
    .cover-ice .scoop1{left:94px;top:40px;width:58px;height:58px;background:#ff9cc2}
    .cover-ice .scoop2{left:126px;top:28px;width:60px;height:60px;background:#fff0a6}
    .cover-ice .scoop3{left:154px;top:42px;width:58px;height:58px;background:#96dcff}
    .cover-ice .sprinkle{position:absolute;width:9px;height:4px;border-radius:999px;background:#fff;transform:rotate(var(--r));opacity:.92}

    .cover-rhythm{background:linear-gradient(180deg,#151b2f,#253659 70%,#1c2844)}
    .cover-rhythm .bar{position:absolute;bottom:18px;width:20px;border-radius:999px 999px 6px 6px;background:linear-gradient(180deg,#8bf4ff,#4c8dff)}
    .cover-rhythm .bar.b1{left:42px;height:42px}.cover-rhythm .bar.b2{left:70px;height:78px}.cover-rhythm .bar.b3{left:98px;height:56px}.cover-rhythm .bar.b4{left:126px;height:96px}.cover-rhythm .bar.b5{left:154px;height:68px}.cover-rhythm .bar.b6{left:182px;height:110px}.cover-rhythm .bar.b7{left:210px;height:84px}
    .cover-rhythm .note{position:absolute;font-size:40px;right:26px;top:18px;color:#fff;filter:drop-shadow(0 10px 16px rgba(76,141,255,.4))}
    .cover-rhythm .ring{position:absolute;border-radius:50%;border:3px solid rgba(139,244,255,.5)}
    .cover-rhythm .ring.r1{width:74px;height:74px;left:24px;top:18px}.cover-rhythm .ring.r2{width:120px;height:120px;left:8px;top:4px;opacity:.4}

    .cover-sushi{background:linear-gradient(180deg,#fff6e1,#ffecc3 55%,#f4ddba)}
    .cover-sushi .tray{position:absolute;left:18px;right:18px;bottom:18px;height:64px;border-radius:18px;background:#5b4334;box-shadow:inset 0 8px 0 rgba(255,255,255,.08)}
    .cover-sushi .piece{position:absolute;bottom:44px;width:58px;height:34px;border-radius:18px;background:#fff;box-shadow:0 6px 10px rgba(91,67,52,.15)}
    .cover-sushi .piece::before{content:"";position:absolute;left:6px;right:6px;top:-12px;height:18px;border-radius:12px;background:var(--top,#ff8e7a)}
    .cover-sushi .piece.p1{left:32px;--top:#ff8e7a}.cover-sushi .piece.p2{left:100px;--top:#ffcf66}.cover-sushi .piece.p3{left:168px;--top:#7fd0ff}
    .cover-sushi .roll{position:absolute;right:26px;top:18px;width:48px;height:48px;border-radius:50%;background:#1f2937;box-shadow:inset 0 0 0 10px #fff, inset 0 0 0 18px #82d38b}

    .cover-quiz{background:linear-gradient(180deg,#dff3ff,#ecf8ff 35%,#173b4f 35% 100%)}
    .cover-quiz .board{position:absolute;left:18px;right:18px;top:26px;bottom:18px;border-radius:16px;background:#28536a;box-shadow:inset 0 0 0 6px #d0b08a}
    .cover-quiz .mark{position:absolute;top:42px;font-weight:900;font-size:52px;line-height:1}
    .cover-quiz .mark.ok{left:48px;color:#8ef0a0}.cover-quiz .mark.ng{right:48px;color:#ff9399}
    .cover-quiz .q{position:absolute;left:50%;top:80px;transform:translateX(-50%);font-size:42px;font-weight:900;color:#fff}
    .cover-quiz .book{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);width:94px;height:22px;border-radius:6px;background:#7cc2ff;box-shadow:0 8px 0 #fff}

    .cover-image,.cover-generic{background:linear-gradient(135deg,var(--cover-bg1,#f0f4ff),var(--cover-bg2,#dbe9ff))}
    .cover-image::before,.cover-generic::before{content:"";position:absolute;inset:0;background:
      linear-gradient(140deg,rgba(255,255,255,.22),transparent 48%),
      repeating-linear-gradient(135deg,var(--cover-line,rgba(36,64,120,.08)) 0 2px,transparent 2px 16px);
      pointer-events:none}
    .cover-image img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
    .cover-image .shade{position:absolute;left:0;right:0;bottom:0;height:38%;background:linear-gradient(180deg,rgba(10,18,30,0),rgba(10,18,30,.18))}
    .cover-generic .emoji{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:clamp(54px,6vw,86px)}
    .cover-generic .orb{position:absolute;border-radius:50%;opacity:.88}
    .cover-generic .orb.o1{width:68px;height:68px;left:14px;top:18px;background:var(--cover-orb1,#78a7ff)}
    .cover-generic .orb.o2{width:94px;height:94px;right:-14px;bottom:-14px;background:var(--cover-orb2,#ffc976)}

    @media (max-width:980px){
      .carousel-stage{height:min(100%,360px)}
      .cart{width:clamp(220px,28vw,310px);height:clamp(172px,22vw,238px)}
    }
    @media (max-width:720px){
      body{padding:10px 10px 14px}
      .launcher{height:calc(100dvh - 24px)}
      .frame{padding:10px;border-radius:26px}
      .viewport{border-radius:20px}
      .carousel-area{padding:14px 10px 20px}
      .carousel-stage{min-height:210px;height:min(100%,300px)}
      .tag{font-size:.66rem;padding:5px 8px}
      .title{font-size:.92rem}.cart.center .title{font-size:1rem}
      .cart-meta{left:18px;right:18px;bottom:12px}
      .bottom-bar{justify-content:center;gap:8px}
      .helper-wrap,.action-row{width:100%}
      .helper,.helper-sub{text-align:center}
      .helper{font-size:.82rem}
      .action-row{justify-content:center}
      .launch-btn,.folder-btn{width:100%;padding:11px 18px}
    }
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}

    .gamepad-monitor{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:20px;
      padding:12px 16px;
      background:linear-gradient(135deg,#f0f4ff,#e8ecf8);
      border:1px solid var(--line);
      border-radius:16px;
      font-size:.9rem;
    }
    .monitor-status{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .status-label{
      font-size:.75rem;
      color:var(--sub);
      font-weight:700;
      letter-spacing:.01em;
      text-transform:uppercase;
    }
    .status-value{
      font-size:1rem;
      font-weight:900;
      color:var(--ink);
    }
    .status-value.connected{
      color:#4caf50;
    }
    .status-value.disconnected{
      color:#9e9e9e;
    }
    .joystick-display{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
    }
    .joystick-canvas{
      width:110px;
      height:110px;
      border:2px solid var(--accent);
      border-radius:50%;
      background:#ffffff;
      box-shadow:inset 0 0 8px rgba(22,35,61,.08);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .joystick-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:#23457a;
      position:absolute;
      transition:all .05s ease-out;
      box-shadow:0 2px 8px rgba(35,69,122,.3);
    }
    .joystick-center{
      width:4px;
      height:4px;
      border-radius:50%;
      background:#d9e1ee;
      position:absolute;
    }
    .axis-values{
      font-size:.8rem;
      text-align:center;
      min-width:80px;
      font-family:monospace;
      color:var(--sub);
    }
    .axis-value-x,.axis-value-y{
      display:block;
    }
    .device-info{
      display:flex;
      flex-direction:column;
      gap:4px;
      flex:1;
      min-width:120px;
    }
    .device-label{
      font-size:.75rem;
      color:var(--sub);
      font-weight:700;
      letter-spacing:.01em;
      text-transform:uppercase;
    }
    .device-name{
      font-size:.85rem;
      font-weight:700;
      color:var(--ink);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:200px;
    }
    .gamepad-tabs{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }
    .gamepad-tab{
      padding:6px 12px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#ffffff;
      color:var(--sub);
      font-size:.8rem;
      font-weight:700;
      cursor:pointer;
      transition:all .16s ease;
      white-space:nowrap;
    }
    .gamepad-tab:hover{
      background:var(--bg);
      border-color:var(--accent);
    }
    .gamepad-tab.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }
    @media (max-width:720px){
      .gamepad-monitor{
        flex-direction:column;
        gap:12px;
        padding:10px 12px;
      }
      .joystick-canvas{
        width:90px;
        height:90px;
      }
    }
  </style>
</head>
<body>
  <main class="launcher">
    <section class="frame">
      <div class="viewport">
        <div class="carousel-area">
          <div class="carousel-stage" id="carouselStage" aria-live="polite"></div>
        </div>
      </div>
    </section>
    <div class="bottom-bar">
      <div class="helper-wrap">
        <div class="helper" id="helperText">読み込み中…</div>
        <div class="helper-sub" id="folderHintText" hidden></div>
      </div>
      <div class="action-row">
        <button class="folder-btn" id="folderButton" type="button" hidden>gamesフォルダを指定</button>
        <button class="launch-btn" id="startButton" type="button" disabled>はじめる</button>
      </div>
    </div>
    <div class="gamepad-monitor" id="gamepadMonitor" style="display:none">
      <div style="width:100%;display:flex;flex-direction:column;gap:8px">
        <div class="gamepad-tabs" id="gamepadTabs"></div>
        <div style="display:flex;align-items:center;gap:20px;justify-content:center">
          <div class="monitor-status">
            <div class="status-label">接続状態</div>
            <div class="status-value disconnected" id="statusIndicator">未接続</div>
          </div>
          <div class="device-info">
            <div class="device-label">デバイス</div>
            <div class="device-name" id="deviceName">-</div>
          </div>
          <div class="joystick-display">
            <div class="joystick-canvas">
              <div class="joystick-center"></div>
              <div class="joystick-dot" id="joystickDot"></div>
            </div>
            <div class="axis-values">
              <span class="axis-value-x">X: <span id="axisX">0.00</span></span>
              <span class="axis-value-y">Y: <span id="axisY">0.00</span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
const FALLBACK_GAMES = [
  { file:'car.html', title:'レトロレーサー', tag:'Arcade', cover:'road', order:10 },
  { file:'robot-wheelchair.html', title:'ロボット車椅子探索', tag:'Open World', cover:'generic', emoji:'🦼', coverColor:'#57b8a8', order:15 },
  { file:'ice-cream.html', title:'アイスタワー', tag:'Balance', cover:'ice', order:20 },
  { file:'rhythm.html', title:'リズム', tag:'Rhythm', cover:'rhythm', order:30 },
  { file:'sushi.html', title:'寿司キャッチ', tag:'Action', cover:'sushi', order:40 },
  { file:'taikan-groove-theater-sound-racer-start.html', title:'たいかんグルーヴ', tag:'Rhythm', cover:'rhythm', emoji:'🧘', order:240, coverColor:'#6e7cff' },
  { file:'sky-ribbon-rise-racer-start.html', title:'スカイリボン・ライズ', tag:'Action', cover:'generic', emoji:'🌌', order:275, coverColor:'#6b53ff' },
  { file:'cyber-breakout.html', title:'NEON BREAKOUT', tag:'Action', cover:'generic', emoji:'👾', coverColor:'#ff00ff', order:999 }
];
const IGNORE_FILES = new Set(['index.html', 'quize.html', 'game-template.html']);
const GAME_REGISTRY_KEY = 'feeling-game-launcher:games:v1';
const HANDLE_DB_NAME = 'feeling-game-launcher-db';
const HANDLE_STORE_NAME = 'settings';
const HANDLE_KEY = 'games-dir-handle';
const DIRECTORY_PICKER_ID = 'feeling-game-games-folder';
const WATCH_INTERVAL_MS = 1000;
const MANIFEST_GLOBAL_KEY = '__FEELING_GAME_MANIFEST__';
const MANIFEST_SCRIPT_PATH = './games-manifest.js';
const MANIFEST_SCRIPT_ID = 'liveGamesManifestScript';
const MANIFEST_NOTE = 'GitHub Pagesなどの静的ホスティング向けに games-manifest.js から一覧を読み込んでいます。';
const LIVE_FEED_PATH = '../__gamecenter__/games.json';
const LIVE_FEED_HOSTS = new Set(['localhost', '127.0.0.1', '0.0.0.0', '::1']);

const COVER_PRESETS = {
  road: {
    className: 'cover-road',
    html: '<div class="sun"></div><div class="road-line"></div><div class="car-top"></div><div class="car-body"></div><div class="wheel"></div><div class="wheel2"></div>'
  },
  ice: {
    className: 'cover-ice',
    html: '<div class="cone"></div><div class="scoop1"></div><div class="scoop2"></div><div class="scoop3"></div>' +
      '<div class="sprinkle" style="left:102px;top:52px;--r:24deg"></div><div class="sprinkle" style="left:138px;top:48px;--r:-18deg"></div>' +
      '<div class="sprinkle" style="left:166px;top:60px;--r:12deg"></div><div class="sprinkle" style="left:150px;top:36px;--r:-32deg"></div>'
  },
  rhythm: {
    className: 'cover-rhythm',
    html: '<div class="ring r1"></div><div class="ring r2"></div><div class="note">♪</div>' +
      '<div class="bar b1"></div><div class="bar b2"></div><div class="bar b3"></div><div class="bar b4"></div><div class="bar b5"></div><div class="bar b6"></div><div class="bar b7"></div>'
  },
  sushi: {
    className: 'cover-sushi',
    html: '<div class="roll"></div><div class="tray"></div><div class="piece p1"></div><div class="piece p2"></div><div class="piece p3"></div>'
  },
  quiz: {
    className: 'cover-quiz',
    html: '<div class="board"></div><div class="mark ok">○</div><div class="mark ng">×</div><div class="q">?</div><div class="book"></div>'
  }
};

    const stage = document.getElementById('carouselStage');
    const helperText = document.getElementById('helperText');
    const folderHintText = document.getElementById('folderHintText');
    const folderButton = document.getElementById('folderButton');
    const startButton = document.getElementById('startButton');
    const gamepadMonitor = document.getElementById('gamepadMonitor');
    const gamepadTabs = document.getElementById('gamepadTabs');
    const statusIndicator = document.getElementById('statusIndicator');
    const deviceName = document.getElementById('deviceName');
    const joystickDot = document.getElementById('joystickDot');
    const axisX = document.getElementById('axisX');
    const axisY = document.getElementById('axisY');

    let games = [];
    let selectedIndex = 0;
    let animating = false;
    let audioCtx = null;
    let launchInProgress = false;
    let launcherWatchTimer = 0;
    let manifestReloadPromise = null;
    let currentDirectoryHandle = null;
    let currentDiscoverySource = 'unknown';
    let renderVersion = 0;
    let gamesSignature = '';
    let launcherInfoSignature = '';
    const padState = { left:false, right:false, confirm:false };
    const allGamepads = {}; // インデックス => {index, id, x, y}
    let selectedGamepadIndex = -1;

    // ゲームパッド情報をsessionStorageに保存
    function saveGamepadState() {
      const state = {
        allGamepads: allGamepads,
        selectedGamepadIndex: selectedGamepadIndex
      };
      sessionStorage.setItem('gamepadState', JSON.stringify(state));
      console.log('💾 ゲームパッド状態を保存しました:', state);
      console.log('sessionStorage の内容:', sessionStorage.getItem('gamepadState'));
    }

    // sessionStorageからゲームパッド情報を復元
    function restoreGamepadState() {
      try {
        console.log('🔍 sessionStorage の全内容:', Object.keys(sessionStorage).map(k => `${k}: ${sessionStorage.getItem(k)}`));
        const saved = sessionStorage.getItem('gamepadState');
        console.log('📥 gamepadState を取得しました:', saved);
        if (saved) {
          const state = JSON.parse(saved);
          selectedGamepadIndex = state.selectedGamepadIndex;
          console.log(`📦 ゲームパッド状態を復元: selectedGamepadIndex = ${selectedGamepadIndex}`);
        } else {

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, duration = 0.08, type = 'square', gainValue = 0.026, when = 0) {
  const ctx = ensureAudio();
  const start = ctx.currentTime + when;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.04);
}
const sfx = {
  move(){ tone(420, 0.04, 'triangle', 0.022); },
  launch(){ tone(300, 0.04, 'square', 0.028); tone(480, 0.05, 'triangle', 0.022, 0.04); tone(720, 0.1, 'triangle', 0.02, 0.08); }
};

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#96;');
}

function normalizeHexColor(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  if (/^#([0-9a-f]{3})$/i.test(raw)) {
    return `#${raw.slice(1).split('').map((ch) => ch + ch).join('').toLowerCase()}`;
  }
  if (/^#([0-9a-f]{6})$/i.test(raw)) return raw.toLowerCase();
  return '';
}

function hexToRgb(hex) {
  const value = normalizeHexColor(hex);
  if (!value) return null;
  return {
    r: Number.parseInt(value.slice(1, 3), 16),
    g: Number.parseInt(value.slice(3, 5), 16),
    b: Number.parseInt(value.slice(5, 7), 16)
  };
}

function rgbToHex(r, g, b) {
  return `#${[r, g, b].map((value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0')).join('')}`;
}

function tintColor(hex, amount) {
  const rgb = hexToRgb(hex);
  if (!rgb) return '';
  const mix = (value) => amount >= 0 ? value + (255 - value) * amount : value * (1 + amount);
  return rgbToHex(mix(rgb.r), mix(rgb.g), mix(rgb.b));
}

function alphaColor(hex, alpha) {
  const rgb = hexToRgb(hex);
  if (!rgb) return `rgba(120, 167, 255, ${alpha})`;
  return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
}

function hashString(value) {
  let hash = 0;
  for (const ch of String(value || '')) {
    hash = ((hash << 5) - hash) + ch.charCodeAt(0);
    hash |= 0;
  }
  return Math.abs(hash);
}

function getCoverPalette(game) {
  const baseHex = normalizeHexColor(game.coverColor);
  if (baseHex) {
    return {
      bg1: tintColor(baseHex, 0.78),
      bg2: tintColor(baseHex, 0.22),
      orb1: alphaColor(tintColor(baseHex, -0.06), 0.24),
      orb2: alphaColor(tintColor(baseHex, 0.32), 0.5),
      line: alphaColor(tintColor(baseHex, -0.12), 0.08)
    };
  }
  const seed = hashString(`${game.file}|${game.title}|${game.tag}`);
  const hue = seed % 360;
  return {
    bg1: `hsl(${hue} 86% 92%)`,
    bg2: `hsl(${(hue + 28) % 360} 78% 82%)`,
    orb1: `hsla(${(hue + 12) % 360} 82% 66% / .34)`,
    orb2: `hsla(${(hue + 156) % 360} 88% 74% / .42)`,
    line: `hsla(${(hue + 8) % 360} 36% 34% / .08)`
  };
}

function coverStyleVars(game) {
  const palette = getCoverPalette(game);
  return `--cover-bg1:${palette.bg1};--cover-bg2:${palette.bg2};--cover-orb1:${palette.orb1};--cover-orb2:${palette.orb2};--cover-line:${palette.line};`;
}

function isImageCover(value) {
  return /\.(?:png|jpe?g|webp|gif|svg|avif)$/i.test(String(value || '').trim());
}

function loadRegistryGames() {
  try {
    const records = JSON.parse(localStorage.getItem(GAME_REGISTRY_KEY) || '[]');
    return Array.isArray(records) ? records : [];
  } catch {
    return [];
  }
}

function saveRegistryGames(records) {
  try {
    const unique = [];
    const seen = new Set();
    records.forEach((record) => {
      if (!record?.file || seen.has(record.file)) return;
      seen.add(record.file);
      unique.push(record);
    });
    localStorage.setItem(GAME_REGISTRY_KEY, JSON.stringify(unique.slice(-160)));
  } catch {}
}

function coverMarkup(game) {
  const preset = COVER_PRESETS[game.cover] || null;
  const coverStyle = coverStyleVars(game);
  if (preset) return `<div class="cover ${preset.className}" style="${coverStyle}">${preset.html}</div>`;
  if (isImageCover(game.cover)) {
    return `<div class="cover cover-image" style="${coverStyle}"><img src="${escapeAttr(game.cover)}" alt=""><div class="shade"></div></div>`;
  }
  const emoji = escapeHtml(game.emoji || '🎮');
  return `<div class="cover cover-generic" style="${coverStyle}"><div class="orb o1"></div><div class="orb o2"></div><div class="emoji">${emoji}</div></div>`;
}

function createCart(game, index) {

      </div>
    </div>`;

  });

}

function buildStage() {
  stage.innerHTML = '';
  games.forEach((game, index) => stage.appendChild(createCart(game, index)));
}

function relativeOffset(index) {
  const total = games.length;
  let diff = index - selectedIndex;
  if (diff > total / 2) diff -= total;
  if (diff < -total / 2) diff += total;
  return diff;
}

function getPose(offset) {
  const firstCard = stage.children[0];
  const cardWidth = firstCard ? firstCard.getBoundingClientRect().width : 280;
  const sideX = Math.round(cardWidth * 0.78);
  const farX = Math.round(cardWidth * 1.16);
  const map = {
    0:{x:0,y:0,scale:1.02,rotate:0,opacity:1,z:40,blur:0},
    1:{x:sideX,y:14,scale:.82,rotate:-8,opacity:.34,z:30,blur:.3},
    '-1':{x:-sideX,y:14,scale:.82,rotate:8,opacity:.34,z:30,blur:.3},
    2:{x:farX,y:22,scale:.68,rotate:-11,opacity:.14,z:20,blur:.75},
    '-2':{x:-farX,y:22,scale:.68,rotate:11,opacity:.14,z:20,blur:.75}
  };
  return map[offset] || {x:offset * farX,y:28,scale:.6,rotate:offset > 0 ? -14 : 14,opacity:0,z:1,blur:1.2};
}

function renderCarousel() {
  [...stage.children].forEach((card, index) => {
    const offset = relativeOffset(index);
    const pose = getPose(offset);
    card.style.zIndex = pose.z;
    card.style.opacity = pose.opacity;
    card.style.filter = `blur(${pose.blur}px)`;
    card.style.transform = `translate(-50%, -50%) translateX(${pose.x}px) translateY(${pose.y}px) scale(${pose.scale}) rotateY(${pose.rotate}deg)`;
    card.classList.toggle('center', offset === 0);
    card.setAttribute('aria-hidden', Math.abs(offset) > 2 ? 'true' : 'false');
    card.setAttribute('tabindex', offset === 0 ? '0' : '-1');
  });
  const game = games[selectedIndex];
  startButton.disabled = !game;
}

function pulseSelectedCard() {
  const card = stage.children[selectedIndex];
  if (!card) return;
  card.animate([
    { transform: card.style.transform, filter: card.style.filter || 'blur(0px)' },
    { transform: `${card.style.transform} scale(1.03)`, filter: 'blur(0px) brightness(1.03)' },
    { transform: card.style.transform, filter: card.style.filter || 'blur(0px)' }
  ], { duration:220, easing:'ease-out' });
}

function selectGame(index, animate = false) {
  if (!games.length || animating) return;

  renderCarousel();
  const game = games[selectedIndex];

  if (animate) {
    ensureAudio();
    sfx.move();
    pulseSelectedCard();

    setTimeout(() => { animating = false; }, 160);

}

function moveSelection(delta) {

    function launchSelected() {

function normalizeGame(record) {
  const fallback = FALLBACK_GAMES.find(item => item.file === record.file) || {};
  const file = String(record.file || fallback.file || '').trim();
  return {
    file,
    title: record.title || fallback.title || file.replace(/\.html$/i, ''),
    tag: record.tag || fallback.tag || 'Game',
    cover: record.cover || fallback.cover || 'generic',
    coverColor: normalizeHexColor(record.coverColor || fallback.coverColor || ''),
    emoji: record.emoji || fallback.emoji || '🎮',
    order: Number(record.order ?? fallback.order ?? 999)
  };
}

function parseGameMeta(fileName, htmlText) {
  const doc = new DOMParser().parseFromString(htmlText, 'text/html');
  const meta = (name) => doc.querySelector(`meta[name="${name}"]`)?.content?.trim() || '';
  return normalizeGame({
    file: fileName,
    title: meta('game:title') || doc.title,
    tag: meta('game:tag'),
    cover: meta('game:cover'),
    coverColor: meta('game:cover-color') || meta('theme-color'),
    emoji: meta('game:emoji'),
    order: meta('game:order')
  });
}

function sortGames(list) {
  const unique = [];
  const seen = new Set();
  list.forEach((item) => {
    if (!item?.file || seen.has(item.file)) return;
    seen.add(item.file);
    unique.push(item);
  });
  return unique.sort((a, b) => a.order - b.order || a.file.localeCompare(b.file, 'ja'));
}

function getGamesSignature(list) {
  return JSON.stringify(list.map((game) => ({
    file: game.file,
    title: game.title,
    tag: game.tag,
    cover: game.cover,
    coverColor: game.coverColor,
    emoji: game.emoji,
    order: game.order
  })));
}

async function verifyGameAccessible(game) {
  if (!game?.file) return false;

  if (currentDiscoverySource === 'handle' && currentDirectoryHandle) {
    try {
      const permission = await getDirectoryPermission(currentDirectoryHandle, false);
      if (permission !== 'granted') return false;
      const entry = await currentDirectoryHandle.getFileHandle(game.file);
      const file = await entry.getFile();
      return !!file;
    } catch {
      return false;
    }
  }

  if (location.protocol !== 'file:') {
    try {
      const head = await fetch(game.file, { method:'HEAD', cache:'no-store' });
      if (head.ok) return true;
    } catch {}
    try {
      const probe = await fetch(game.file, { cache:'no-store', headers:{ Range:'bytes=0-0' } });
      return probe.ok;
    } catch {
      return false;
    }
  }

  return true;
}

async function openHandleDb() {
  if (!('indexedDB' in window)) return null;
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(HANDLE_DB_NAME, 1);
    req.onupgradeneeded = () => {
      if (!req.result.objectStoreNames.contains(HANDLE_STORE_NAME)) {
        req.result.createObjectStore(HANDLE_STORE_NAME);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbGet(key) {
  const db = await openHandleDb();
  if (!db) return null;
  return new Promise((resolve, reject) => {
    const tx = db.transaction(HANDLE_STORE_NAME, 'readonly');
    const req = tx.objectStore(HANDLE_STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror = () => reject(req.error);
  });
}

async function idbSet(key, value) {
  const db = await openHandleDb();
  if (!db) return;
  return new Promise((resolve, reject) => {
    const tx = db.transaction(HANDLE_STORE_NAME, 'readwrite');
    tx.objectStore(HANDLE_STORE_NAME).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function loadStoredDirectoryHandle() {
  try {
    return await idbGet(HANDLE_KEY);
  } catch {
    return null;
  }
}

async function saveStoredDirectoryHandle(handle) {
  try {
    await idbSet(HANDLE_KEY, handle);
  } catch {}
}

async function getDirectoryPermission(handle, ask = false) {
  if (!handle) return 'denied';
  try {
    if (typeof handle.queryPermission !== 'function') return 'granted';
    let state = await handle.queryPermission({ mode:'read' });
    if (state === 'granted') return state;
    if (ask && typeof handle.requestPermission === 'function') {
      state = await handle.requestPermission({ mode:'read' });
    }
    return state;
  } catch {
    return 'denied';
  }
}

async function enumerateGamesFromHandle(handle) {
  const permission = await getDirectoryPermission(handle, false);
  if (permission !== 'granted') return { games:[], permission };
  const loaded = [];
  try {
    for await (const [name, entry] of handle.entries()) {
      if (entry.kind !== 'file') continue;
      if (!/\.html?$/i.test(name)) continue;
      if (IGNORE_FILES.has(name) || name.startsWith('_') || name.startsWith('.')) continue;
      const file = await entry.getFile();
      const text = await file.text();
      loaded.push(parseGameMeta(name, text));
    }
    return { games:sortGames(loaded), permission:'granted' };
  } catch {
    return { games:[], permission:'error' };
  }
}

async function loadLiveGameFeed() {
  if (location.protocol === 'file:') return null;
  if (!LIVE_FEED_HOSTS.has(location.hostname) && !location.hostname.endsWith('.localhost')) return null;
  try {
    const res = await fetch(LIVE_FEED_PATH, { cache:'no-store' });
    if (!res.ok) return null;
    const payload = await res.json();
    if (!payload || !Array.isArray(payload.games)) return null;
    return {
      games: sortGames(payload.games.map(normalizeGame)),
      generatedAt: String(payload.generatedAt || ''),
      source: String(payload.source || 'server-feed')
    };
  } catch {
    return null;
  }
}

async function discoverFilesFromDirectory() {
  if (location.protocol === 'file:') return [];
  try {
    const res = await fetch('./', { cache:'no-store' });
    if (!res.ok) return [];
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/html');
    const hrefs = [...doc.querySelectorAll('a[href]')]
      .map((a) => a.getAttribute('href') || '')
      .map((href) => href.split('#')[0].split('?')[0])
      .filter((href) => /\.html?$/i.test(href))
      .map((href) => href.replace(/^\.\//, ''))
      .filter((href) => !href.includes('/'))
      .filter((href) => !IGNORE_FILES.has(href))
      .filter((href) => !href.startsWith('_') && !href.startsWith('.'));
    return [...new Set(hrefs)];
  } catch {
    return [];
  }
}

async function fetchGamesByFiles(files) {
  const uniqueFiles = [...new Set(files.filter(Boolean))];
  const loaded = await Promise.all(uniqueFiles.map(async (file) => {
    try {
      const res = await fetch(file, { cache:'no-store' });
      if (!res.ok) throw new Error('read failed');
      const text = await res.text();
      return parseGameMeta(file, text);
    } catch {
      return null;
    }
  }));
  return sortGames(loaded.filter(Boolean));
}

function readManifestGames() {
  const payload = window[MANIFEST_GLOBAL_KEY];
  if (!payload || !Array.isArray(payload.games)) return null;
  return {
    games: sortGames(payload.games.map(normalizeGame)),
    generatedAt: String(payload.generatedAt || ''),
    version: String(payload.version || ''),
    source: String(payload.source || 'manifest')
  };
}

async function reloadManifestGames() {
  if (manifestReloadPromise) return manifestReloadPromise;
  manifestReloadPromise = new Promise((resolve) => {
    const script = document.createElement('script');
    script.id = MANIFEST_SCRIPT_ID;
    script.src = `${MANIFEST_SCRIPT_PATH}?v=${Date.now()}`;
    script.async = true;
    script.onload = () => {
      const current = readManifestGames();
      manifestReloadPromise = null;
      resolve(current);
    };
    script.onerror = () => {
      script.remove();
      manifestReloadPromise = null;
      resolve(readManifestGames());
    };
    const previous = document.getElementById(MANIFEST_SCRIPT_ID);
    if (previous) previous.removeAttribute('id');
    document.head.appendChild(script);
    if (previous) {
      previous.remove();
    }
  });
  return manifestReloadPromise;
}

async function loadManifestGames(options = {}) {
  const { forceReload = false } = options;
  const current = readManifestGames();
  if (current && !forceReload) return current;
  const reloaded = await reloadManifestGames();
  return reloaded || current || null;
}

async function loadGames() {
  const registryGames = loadRegistryGames();
  const folderCapable = typeof window.showDirectoryPicker === 'function';
  let note = '';
  let showFolderButton = folderCapable;
  let folderButtonLabel = 'Game（games）フォルダを開く';

  const liveFeed = await loadLiveGameFeed();
  if (liveFeed) {
    saveRegistryGames(liveFeed.games.map((game) => ({ ...game, updatedAt:Date.now() })));
    return {
      games: liveFeed.games,
      helper: liveFeed.games.length ? `${liveFeed.games.length} 件のゲームを読み込みました` : '現在の Game（games）フォルダにゲームがありません',
      note: '起動スクリプトのライブ監視中です。games フォルダへの追加・削除は自動で反映されます。',
      showFolderButton:false,
      folderButtonLabel,
      source:'server-feed',
      directoryHandle:null
    };
  }

  if (location.protocol === 'file:') {
    return {
      games: [],
      helper: 'GitHub PagesなどのHTTP/HTTPS URLで開いてください',
      note: note || '直接 file:// で開くと PlayCanvas の config.json や音声ファイルがブラウザにブロックされます。ローカル確認では start_game_center.bat / start_game_center.command / python3 start_game_center.py を使ってください。',
      showFolderButton:folderCapable,
      folderButtonLabel,
      source:'needs-http',
      directoryHandle:null
    };
  }

  const manifestFeed = await loadManifestGames();
  if (manifestFeed) {
    saveRegistryGames(manifestFeed.games.map((game) => ({ ...game, updatedAt:Date.now() })));
    return {
      games: manifestFeed.games,
      helper: manifestFeed.games.length ? `${manifestFeed.games.length} 件のゲームを読み込みました` : 'games-manifest.js にゲームがありません',
      note: MANIFEST_NOTE,
      showFolderButton:false,
      folderButtonLabel,
      source:'manifest',
      directoryHandle:null
    };
  }

  const storedHandle = await loadStoredDirectoryHandle();
  const discovered = await discoverFilesFromDirectory();
  if (discovered.length) {
    const serverGames = await fetchGamesByFiles(discovered);
    saveRegistryGames(serverGames.map((game) => ({ ...game, updatedAt:Date.now() })));
    return {
      games: serverGames,
      helper: serverGames.length ? `${serverGames.length} 件のゲームを読み込みました` : '現在の Game（games）フォルダにゲームがありません',
      note: '現在開いている Game（games）フォルダを自動監視しています。HTML を追加・削除すると一覧へそのまま反映されます。',
      showFolderButton:false,
      folderButtonLabel,
      source:'server',
      directoryHandle:null
    };
  }

  if (storedHandle) {
    const fromHandle = await enumerateGamesFromHandle(storedHandle);
    if (fromHandle.permission === 'granted') {
      saveRegistryGames(fromHandle.games.map((game) => ({ ...game, updatedAt:Date.now() })));
      return {
        games: fromHandle.games,
        helper: fromHandle.games.length ? `${fromHandle.games.length} 件のゲームを読み込みました` : '選択した Game（games）フォルダにゲームがありません',
        note: '保存済みの Game（games）フォルダを自動監視しています。HTML を追加・削除すると一覧へそのまま反映されます。',
        showFolderButton,
        folderButtonLabel:'Game（games）フォルダを変更',
        source:'handle',
        directoryHandle:storedHandle
      };
    }
    folderButtonLabel = 'Game（games）フォルダを変更';
    note = '保存済みのフォルダ権限を確認できませんでした。';
  }

  const candidates = [...registryGames.map((game) => game.file), ...FALLBACK_GAMES.map((game) => game.file)];
  const verifiedGames = await fetchGamesByFiles(candidates);
  saveRegistryGames(verifiedGames.map((game) => ({ ...game, updatedAt:Date.now() })));
  return {
    games: verifiedGames,
    helper: verifiedGames.length ? `${verifiedGames.length} 件のゲームを読み込みました` : 'Game（games）フォルダにゲームがありません',
    note: note || '既知の HTML を実在確認しつつ監視しています。',
    showFolderButton:folderCapable,
    folderButtonLabel,
    source:'verified',
    directoryHandle:null
  };
}

async function renderLauncher(options = {}) {
  const { silent = false, preserveSelection = true, force = false } = options;
  const currentRenderVersion = ++renderVersion;
  const previousSelectedFile = preserveSelection ? (games[selectedIndex]?.file || '') : '';
  const previousSelectedIndex = selectedIndex;
  const previousGamesSignature = gamesSignature;
  const previousInfoSignature = launcherInfoSignature;

  if (!silent) {
    setLauncherNote('読み込み中…');
    startButton.disabled = true;
  }

  const result = await loadGames();
  if (currentRenderVersion !== renderVersion) return;

  const nextGamesSignature = getGamesSignature(result.games);
  const nextInfoSignature = JSON.stringify({
    helper: result.helper,
    note: result.note,
    showFolderButton: result.showFolderButton,
    folderButtonLabel: result.folderButtonLabel,
    source: result.source || 'unknown'
  });
  const gamesChanged = force || nextGamesSignature !== previousGamesSignature;
  const infoChanged = force || nextInfoSignature !== previousInfoSignature;

  currentDirectoryHandle = result.directoryHandle || null;
  currentDiscoverySource = result.source || 'unknown';
  setFolderButton(result.showFolderButton, result.folderButtonLabel, false);

  if (silent && !gamesChanged && !infoChanged) return;

  gamesSignature = nextGamesSignature;
  launcherInfoSignature = nextInfoSignature;

  if (!result.games.length) {
    games = [];
    selectedIndex = 0;
    stage.innerHTML = '';
    startButton.disabled = true;
    setLauncherNote(result.helper, result.note);
    return;
  }

  games = result.games;
  const shouldRebuild = gamesChanged || stage.children.length !== games.length;
  if (shouldRebuild) {
    buildStage();
    let nextIndex = 0;
    if (previousSelectedFile) {
      const matchedIndex = games.findIndex((game) => game.file === previousSelectedFile);
      if (matchedIndex >= 0) nextIndex = matchedIndex;
      else nextIndex = Math.min(previousSelectedIndex, games.length - 1);
    }
    selectedIndex = Math.max(0, Math.min(nextIndex, games.length - 1));
    selectGame(selectedIndex, false);
  } else {
    selectedIndex = Math.max(0, Math.min(selectedIndex, games.length - 1));
    renderCarousel();
    startButton.disabled = !games[selectedIndex];
    if (!silent) setSelectionHelper(games[selectedIndex]);
  }

  if (!silent || gamesChanged || infoChanged) {
    setLauncherSubNote(result.helper, result.note);
  }
}

async function pickGamesFolder() {
  if (typeof window.showDirectoryPicker !== 'function') return;
  try {
    setFolderButton(true, 'Game（games）フォルダを確認中…', true);
    const storedHandle = await loadStoredDirectoryHandle();
    const pickerOptions = { id:DIRECTORY_PICKER_ID, mode:'read' };
    if (storedHandle) pickerOptions.startIn = storedHandle;
    const handle = await window.showDirectoryPicker(pickerOptions);
    await saveStoredDirectoryHandle(handle);
    const permission = await getDirectoryPermission(handle, true);
    if (permission !== 'granted') {
      setLauncherNote('Game（games）フォルダの権限が必要です', '追加・削除の同期には読み取り許可を付与してください。');
      return;
    }
    await renderLauncher({ silent:false, preserveSelection:true, force:true });
  } catch (error) {
    if (error?.name !== 'AbortError') {
      setLauncherNote('Game（games）フォルダを開けませんでした', 'GitHub Pagesの公開URL、または start_game_center.bat / start_game_center.command / python3 start_game_center.py から開いてください。');
    }
  } finally {
    setFolderButton(!folderButton.hidden, folderButton.textContent || 'gamesフォルダを指定', false);
  }
}

function handleKeydown(e) {
  if (['ArrowLeft','a','A'].includes(e.key)) { e.preventDefault(); moveSelection(-1); }
  if (['ArrowRight','d','D'].includes(e.key)) { e.preventDefault(); moveSelection(1); }
  if (['Enter',' ','ArrowUp'].includes(e.key)) { e.preventDefault(); launchSelected(); }
}

    let lastConnectedCount = 0;
    function pollGamepad() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      const connectedPads = [...pads].map((p, i) => p ? { index: i, pad: p } : null).filter(Boolean);
      
      // 全ゲームパッドの状態を更新（タブ更新より前に実行）
      connectedPads.forEach(({ index, pad }) => {
        const rawX = pad.axes[0] || 0;
        const rawY = pad.axes[1] || 0;
        const x = parseFloat(rawX.toFixed(2));
        const y = parseFloat(rawY.toFixed(2));
        
        if (!allGamepads[index]) {
          console.log(`✅ ゲームパッド接続 [${index}]: ${pad.id}`);
          console.log(`  ボタン数: ${pad.buttons.length}, 軸数: ${pad.axes.length}`);
        }
        
        allGamepads[index] = {
          index: index,
          id: pad.id || `Gamepad ${index}`,
          x: x,
          y: y
        };
      });
      
      // 切断されたゲームパッドを削除
      Object.keys(allGamepads).forEach(idx => {
        if (!connectedPads.find(c => c.index === parseInt(idx))) {
          console.log(`❌ ゲームパッド切断 [${idx}]: ${allGamepads[idx].id}`);
          delete allGamepads[idx];
          if (selectedGamepadIndex === parseInt(idx)) {
            selectedGamepadIndex = -1;
          }
        }
      });
      
      // 接続状態の変化を検知してタブを更新
      if (connectedPads.length !== lastConnectedCount) {
        console.log(`📊 ゲームパッド数変化: ${lastConnectedCount} → ${connectedPads.length}`);
        lastConnectedCount = connectedPads.length;
        updateGamepadTabs();
      }
      
      // ゲームパッド状態を保存（定期的に更新）→ 削除（毎フレーム保存による上書き問題を解決）
      
      // 選択されたゲームパッドで操作入力を処理
      if (selectedGamepadIndex >= 0 && allGamepads[selectedGamepadIndex]) {
        const pad = pads[selectedGamepadIndex];
        if (pad) {
          const rawX = pad.axes[0] || 0;
          const rawY = pad.axes[1] || 0;
          const x = Math.abs(rawX) > 0.35 ? rawX : 0;
          const y = Math.abs(rawY) > 0.35 ? rawY : 0;
          const left = !!(pad.buttons[14]?.pressed || x < -0.35);
          const right = !!(pad.buttons[15]?.pressed || x > 0.35);
          const confirm = !!(pad.buttons[12]?.pressed || pad.buttons[0]?.pressed || pad.buttons[1]?.pressed || y < -0.45);
          if (left && !padState.left) moveSelection(-1);
          if (right && !padState.right) moveSelection(1);
          if (confirm && !padState.confirm) launchSelected();
          padState.left = left;
          padState.right = right;
          padState.confirm = confirm;
        }
      }
    }
    
    function updateGamepadTabs() {
      console.log('updateGamepadTabs 実行中:', { selectedGamepadIndex, allGamepads });
      gamepadTabs.innerHTML = '';
      
      // allGamepadsが空の場合は早期終了（ただしselectedGamepadIndexはリセットしない）
      if (Object.keys(allGamepads).length === 0) {
        console.log('⚠️ ゲームパッドが接続されていません');
        return;
      }
      
      // 復元されたゲームパッドが実際に存在するかチェック
      if (selectedGamepadIndex >= 0 && !allGamepads[selectedGamepadIndex]) {
        console.log(`⚠️ 復元されたゲームパッド [${selectedGamepadIndex}] が存在しません。最初のゲームパッドに変更します`);
        selectedGamepadIndex = parseInt(Object.keys(allGamepads)[0]);
      }
      
      Object.entries(allGamepads).forEach(([idx, pad]) => {
        const tab = document.createElement('button');
        tab.className = 'gamepad-tab';
        tab.textContent = `Pad ${idx}`;
        tab.onclick = () => selectGamepad(parseInt(idx));
        if (parseInt(idx) === selectedGamepadIndex) {
          tab.classList.add('active');
          console.log(`✅ Pad ${idx} をアクティブに設定`);
        }
        gamepadTabs.appendChild(tab);
      });
      
      // 最初のゲームパッドを自動選択
      if (selectedGamepadIndex === -1 && Object.keys(allGamepads).length > 0) {
        selectGamepad(parseInt(Object.keys(allGamepads)[0]));
      }
    }
    
    function selectGamepad(index) {
      selectedGamepadIndex = index;
      updateGamepadTabs();
      console.log(`🎮 ゲームパッド選択: [${index}] ${allGamepads[index]?.id}`);
      // ゲームパッド選択時に状態を保存
      saveGamepadState();
    }

    function updateGamepadDisplay() {
      const hasGamepads = Object.keys(allGamepads).length > 0;
      gamepadMonitor.style.display = hasGamepads ? 'flex' : 'none';
      if (!hasGamepads) return;
      
      const currentPad = allGamepads[selectedGamepadIndex];
      if (!currentPad) {
        statusIndicator.textContent = '未接続';
        statusIndicator.className = 'status-value disconnected';
        deviceName.textContent = '-';
        axisX.textContent = '0.00';
        axisY.textContent = '0.00';
        return;
      }
      
      statusIndicator.textContent = '接続中';
      statusIndicator.className = 'status-value connected';
      deviceName.textContent = currentPad.id;
      axisX.textContent = currentPad.x.toFixed(2);
      axisY.textContent = currentPad.y.toFixed(2);
      
      const maxDistance = 45;
      const x = currentPad.x * maxDistance;
      const y = currentPad.y * maxDistance;
      joystickDot.style.left = `calc(50% + ${x}px)`;
      joystickDot.style.top = `calc(50% + ${y}px)`;
      joystickDot.style.transform = 'translate(-50%, -50%)';
    }

    function loop() {
      pollGamepad();
      updateGamepadDisplay();
      requestAnimationFrame(loop);
    }

startButton.addEventListener('click', launchSelected);
folderButton.addEventListener('click', pickGamesFolder);
window.addEventListener('pointerdown', () => ensureAudio(), { passive:true });
window.addEventListener('keydown', handleKeydown);
window.addEventListener('resize', renderCarousel);
window.addEventListener('focus', () => { renderLauncher({ silent:true, preserveSelection:true, force:true }); });
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) renderLauncher({ silent:true, preserveSelection:true, force:true });
});
window.addEventListener('beforeunload', stopLauncherWatch);

    (async () => {
      await renderLauncher({ silent:false, preserveSelection:false, force:true });
      if (!games.length) {
        helperText.textContent = 'games フォルダにゲームがありません';
        return;
      }
      // ゲームパッド状態を復元
      restoreGamepadState();
      // 実際のゲームパッド状態を即座に取得（複数回試す）
      console.log('🔄 ゲームパッド検出開始（最大3回試行）');
      for (let i = 0; i < 3; i++) {
        pollGamepad();
        console.log(`試行 ${i + 1}: ${Object.keys(allGamepads).length} 台検出`);
        if (Object.keys(allGamepads).length > 0) break;
      }
      updateGamepadTabs();
      updateGamepadDisplay();
      selectGame(0, false);
      requestAnimationFrame(loop);
      startLauncherWatch();
    })();
  </script>
