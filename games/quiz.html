<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="game:title" content="クイズ">
    <meta name="game:tag" content="Quiz">
    <meta name="game:cover" content="quiz">
    <meta name="game:order" content="50">
    <meta name="game:emoji" content="❓">
    <!-- Launcher は上の meta 情報を見て自動でゲーム一覧を作ります -->
  <title>Feeling Game | クイズ</title>
  <style>
    :root{
      --bg1:#10243e;--bg2:#163c66;--panel:rgba(7,18,34,.88);--border:rgba(255,255,255,.16);
      --text:#f6fbff;--sub:#cbe2ff;--accent:#55d6ff;--good:#30d28c;--bad:#ff6b7a;--warn:#ffd166;
      --shadow:0 10px 30px rgba(0,0,0,.25);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;color:var(--text);
      background:
      radial-gradient(circle at 20% 20%, rgba(85,214,255,.12), transparent 25%),
      radial-gradient(circle at 80% 10%, rgba(255,209,102,.12), transparent 28%),
      linear-gradient(160deg,var(--bg1),var(--bg2));overflow:auto;}
    body{padding:16px 18px 24px;display:block}
    #app{width:min(96vw,1120px);min-height:calc(100vh - 40px);height:auto;display:grid;grid-template-rows:auto 1fr auto;gap:14px;margin:0 auto}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    .topbar{padding:12px 18px;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:12px;align-items:center}
    .brand-title{font-size:clamp(1rem,2vw,1.45rem);font-weight:800;letter-spacing:.03em}
    .brand-sub{font-size:clamp(.7rem,1.15vw,.94rem);color:var(--sub);margin-top:4px}
    .status-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:10px 12px}
    .status-label{font-size:clamp(.65rem,1vw,.82rem);color:var(--sub)}
    .status-value{font-size:clamp(.88rem,1.5vw,1.08rem);font-weight:700}
    .ok{color:var(--good)} .ng{color:var(--bad)}
    .screen{display:none;padding:16px;min-height:0;overflow:visible}
    .screen.active{display:grid;gap:16px}
    .hero{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(300px,.9fr);gap:14px;min-height:0}
    .box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:20px;padding:18px}
    .hero-title{font-size:clamp(1.45rem,3.1vw,2.4rem);line-height:1.18;margin:0 0 10px}
    .text,.help{color:var(--sub);line-height:1.75}
    .section-title{font-size:clamp(.95rem,1.6vw,1.2rem);font-weight:800;margin:0 0 10px}
    .mode-list,.list{display:grid;gap:10px}
    .mode-item{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);font-weight:800}
    .debug{padding:10px 12px;border-radius:14px;background:rgba(0,0,0,.26);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:clamp(.72rem,1vw,.84rem);line-height:1.55;white-space:pre-wrap;color:#dff6ff}
    .select-wrap{display:grid;gap:14px}
    .group-title{font-size:1rem;font-weight:800;margin:0 0 8px}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px}
    button{border:0;cursor:pointer;font:inherit;color:inherit;transition:transform .12s ease,filter .12s ease,background .12s ease}
    button:hover{filter:brightness(1.06)} button:active{transform:scale(.98)}
    .card-btn,.answer-btn,.control-btn,.action-btn{border-radius:18px;border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow)}
    .card-btn{min-height:110px;padding:16px;background:linear-gradient(180deg,rgba(85,214,255,.18),rgba(85,214,255,.06));display:flex;flex-direction:column;justify-content:center;gap:8px;text-align:left;overflow:hidden}
    .selected{outline:3px solid var(--accent);outline-offset:2px}
    .card-name{font-size:clamp(1rem,1.85vw,1.18rem);font-weight:800}
    .card-desc{font-size:clamp(.78rem,1.08vw,.92rem);color:var(--sub);line-height:1.55}
    .bottom{display:grid;grid-template-columns:1.15fr .95fr;gap:14px}
    .control-list{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .control-btn,.action-btn{min-height:48px;background:rgba(255,255,255,.07);padding:8px 12px;font-size:clamp(.76rem,1.15vw,.92rem);font-weight:700}
    .quiz-main,.result-main{display:grid;gap:14px;min-height:0}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .stat{padding:10px 12px;background:rgba(255,255,255,.05);border-radius:16px;border:1px solid rgba(255,255,255,.1);min-height:72px;display:flex;flex-direction:column;justify-content:center}
    .stat-name{color:var(--sub);font-size:clamp(.7rem,1vw,.82rem)} .stat-value{font-size:clamp(1rem,2vw,1.34rem);font-weight:800}
    .timer-head{display:flex;justify-content:space-between;align-items:center;font-size:clamp(.8rem,1.2vw,1rem);color:var(--sub);margin-bottom:8px}
    .timer-bar{width:100%;height:16px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.12)}
    .timer-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--good),var(--warn),var(--bad));transition:width .08s linear}
    .question{display:grid;place-items:center;text-align:center;padding:24px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border-radius:22px;border:1px solid rgba(255,255,255,.14);min-height:220px}
    .question-text{font-size:clamp(1.2rem,3.3vw,2.4rem);font-weight:800;line-height:1.45;overflow-wrap:anywhere}
    .answers{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .answer-btn{min-height:126px;padding:12px;display:grid;place-items:center;text-align:center;gap:8px;background:rgba(255,255,255,.06)}
    .maru{background:linear-gradient(180deg,rgba(48,210,140,.18),rgba(48,210,140,.06))}
    .batsu{background:linear-gradient(180deg,rgba(255,107,122,.18),rgba(255,107,122,.06))}
    .answer-symbol{font-size:clamp(2.2rem,7vw,4.2rem);line-height:1;font-weight:900}
    .answer-btn.choice .answer-symbol{font-size:clamp(1.6rem,4vw,2rem)}
    .answer-btn.choice .answer-label{font-size:clamp(1.05rem,2vw,1.5rem);color:var(--text)}
    .answer-label{font-size:clamp(.95rem,1.7vw,1.2rem);color:var(--sub);font-weight:700}
    .correct{outline:3px solid var(--good);outline-offset:2px}.wrong{outline:3px solid var(--bad);outline-offset:2px}
    .feedback{min-height:88px;display:grid;gap:6px;align-content:center}
    .feedback-main{font-size:clamp(1rem,2vw,1.35rem);font-weight:800}.feedback-sub{color:var(--sub);font-size:clamp(.82rem,1.3vw,.98rem);line-height:1.65}
    .score-big{font-size:clamp(2rem,7vw,4.5rem);font-weight:900;line-height:1}
    .review-list{overflow:auto;min-height:0;display:grid;gap:10px;padding-right:4px}
    .review{padding:12px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
    .review-head{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px;font-weight:700}
    .pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:3px 8px;font-size:.8rem}
    .pill.good{background:rgba(48,210,140,.18);color:var(--good)} .pill.bad{background:rgba(255,107,122,.18);color:var(--bad)}
    .warning{color:var(--warn)}
    .intro-stack{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 14px}
    .intro-pill{padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-weight:700}

    .title-shell{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(320px,.92fr);gap:14px}
    .hero-lead{font-size:clamp(.96rem,1.5vw,1.08rem);margin:0 0 12px}
    .step-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);font-weight:800;color:#d7efff;margin-bottom:12px}
    .server-note{padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.92rem}
    .section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .mini-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:.88rem;font-weight:800;color:#d7efff}
    .mode-list.inline{grid-template-columns:repeat(3,minmax(0,1fr))}
    .preview-card{margin-top:12px;padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
    .preview-label{font-size:.78rem;color:var(--sub);font-weight:700;letter-spacing:.04em}
    .preview-title{font-size:1.2rem;font-weight:900;margin-top:6px}
    .preview-desc{font-size:.95rem;color:var(--sub);margin-top:6px;line-height:1.65}
    .debug-details{margin-top:12px}
    .debug-details summary{cursor:pointer;color:var(--sub);font-weight:700}
    .group-tabs{display:inline-grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:6px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
    .group-tab{min-height:42px;padding:8px 16px;border-radius:999px;background:transparent;border:1px solid transparent;font-weight:800;box-shadow:none}
    .group-tab.active{background:rgba(85,214,255,.18);border-color:rgba(85,214,255,.42)}
    .group-panel{display:none;gap:12px}
    .group-panel.active{display:grid}
    .group-help{color:var(--sub);font-size:.93rem;line-height:1.65}
    .title-bottom{grid-template-columns:1.08fr .92fr}
    .compact-help{font-size:.95rem}
    @media (max-width:950px){.title-shell,.title-bottom,.mode-list.inline{grid-template-columns:1fr}}
    @media (max-width:680px){body{padding:14px 12px 24px}#app{min-height:calc(100vh - 24px)}.card-grid,.stats,.control-list{grid-template-columns:1fr 1fr}.answers,.bottom,.hero,.topbar,.title-shell,.title-bottom,.mode-list.inline{grid-template-columns:1fr}.card-btn{min-height:92px}.question{min-height:180px;padding:18px}.mode-item{padding:10px 12px}.group-tabs{width:100%}}
    .home-btn{position:fixed;top:12px;left:12px;z-index:30;padding:9px 12px;border-radius:999px;text-decoration:none;color:#fff;background:rgba(7,18,34,.72);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(8px);box-shadow:0 10px 24px rgba(0,0,0,.22)}
    .home-btn:hover{filter:brightness(1.08)}
    @media (max-width:950px){.topbar,.hero,.bottom,.select-wrap{grid-template-columns:1fr}}
    @media (max-width:860px){.card-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:680px){.card-grid,.stats,.control-list{grid-template-columns:1fr 1fr}.answers,.select-wrap,.bottom,.hero,.topbar{grid-template-columns:1fr}}
  
    .sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
    .brand-sub,.step-badge,.hero-lead,.intro-stack,.server-note,.group-help,.debug-details{display:none!important}
    .topbar{display:none}
    .brand-title{font-size:clamp(1rem,1.8vw,1.3rem)}
    .status-box{padding:8px 10px;border-radius:14px}
    #titleScreen{gap:10px;min-height:0;grid-template-rows:auto minmax(0,1fr) auto}
    .compact-title-shell{grid-template-columns:1fr}
    .compact-hero-box{padding:14px}
    .compact-hero-title{font-size:clamp(1.2rem,2.2vw,1.7rem);margin:0}
    .compact-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;margin-top:10px}
    .compact-preview{margin-top:0;padding:10px 12px;min-height:0}
    .preview-label{display:none}
    .preview-title{font-size:1.02rem;margin-top:0}
    .preview-desc{display:none}
    .compact-mode-list{grid-template-columns:repeat(3,50px);gap:6px}
    .compact-mode-item{padding:8px 0;min-height:46px;font-size:1rem}
    .compact-mode-item input{margin:0;accent-color:var(--accent)}
    .compact-status-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .mini-pill b{font-size:inherit}
    .compact-select-box{padding:12px;display:grid;grid-template-rows:auto minmax(0,1fr);min-height:0}
    .compact-head{margin-bottom:8px}
    .section-title{margin:0;font-size:1rem}
    .card-grid{grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px}
    .card-btn{min-height:68px;padding:10px 12px;gap:0;align-items:center;text-align:center}
    .card-name{font-size:clamp(.94rem,1.45vw,1.04rem)}
    .card-desc{display:none}
    .group-panel{gap:0}
    .compact-title-bottom{grid-template-columns:minmax(0,1fr) 308px;align-items:stretch}
    .compact-start-box,.compact-button-box{padding:12px 14px}
    .compact-help{font-size:.82rem;line-height:1.4}
    .control-list{gap:6px}
    .control-btn{min-height:40px;padding:8px 10px}
    @media (max-width:950px){#app{height:auto;min-height:calc(100dvh - 24px)}.compact-title-bottom,.compact-row{grid-template-columns:1fr}.compact-mode-list{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media (max-width:680px){body{padding:10px;overflow:auto}#app{height:auto;min-height:calc(100dvh - 20px)}.compact-row{grid-template-columns:1fr}.compact-mode-list{grid-template-columns:repeat(3,minmax(0,1fr))}.card-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.compact-title-bottom{grid-template-columns:1fr}}


    /* viewport-fit overrides */
    body{padding:12px;overflow:hidden;min-height:100dvh}
    #app{width:min(96vw,1120px);height:calc(100dvh - 24px);min-height:0;grid-template-rows:minmax(0,1fr)}
    #titleScreen.screen.active{display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:10px;overflow:hidden}
    #titleScreen .group-panel.active{display:grid;align-content:start}
    #titleScreen .compact-select-box{overflow:hidden}
    #titleScreen .card-grid{align-content:start}
    #titleScreen .card-btn{min-height:64px}
    #titleScreen .compact-title-bottom{grid-template-columns:minmax(0,1fr) 286px}
    #titleScreen .compact-button-box .control-list{grid-template-columns:repeat(4,minmax(0,1fr))}
    #titleScreen .compact-start-box,#titleScreen .compact-button-box{min-height:0}
    @media (max-width:950px){
      body{overflow:auto}
      #app{height:auto;min-height:calc(100dvh - 24px)}
      #titleScreen .compact-title-bottom{grid-template-columns:1fr}
    }

  </style>
</head>
<body>
  <a class="home-btn" href="./index.html">← ゲーム選択</a>
  <div id="app">
    <div class="panel topbar">
      <div>
        <div class="brand-title">クイズ</div>
        <div class="brand-sub">えらんですぐスタート</div>
      </div>
      <div class="status-box">
        <div class="status-label">入力モード</div>
        <div class="status-value" id="inputModeLabel">キーボード</div>
      </div>
      <div class="status-box">
        <div class="status-label">ゲームパッド</div>
        <div class="status-value ng" id="padStatus">未接続</div>
      </div>
    </div>

    <section id="titleScreen" class="panel screen active">
      <div class="title-shell compact-title-shell">
        <div class="box compact-hero-box">
          <h1 class="hero-title compact-hero-title">クイズ</h1>
          <div class="compact-row">
            <div class="preview-card compact-preview">
              
              <div class="preview-title" id="selectedCategoryTitle">1年生</div>
              <div class="preview-desc" id="selectedCategoryDesc">ひらがな・かず・せいかつ</div>
            </div>
            <div class="mode-list inline compact-mode-list">
              <label class="mode-item compact-mode-item"><input type="radio" name="inputMode" value="keyboard" checked> ⌨️</label>
              <label class="mode-item compact-mode-item"><input type="radio" name="inputMode" value="gamepad"> 🎮</label>
              <label class="mode-item compact-mode-item"><input type="radio" name="inputMode" value="gyro"> 📱</label>
            </div>
          </div>
          <div class="compact-status-row">
            <span class="mini-pill" id="miniPadStatus">パッド: 未接続</span>
          </div>
          <div class="debug sr-only" id="debugOut">読み込み中…</div>
        </div>
      </div>

      <div class="box compact-select-box">
        <div class="section-head compact-head">
          <div class="section-title">カテゴリ</div>
          <div class="group-tabs">
            <button class="group-tab active" id="tabGrade" type="button">学年</button>
            <button class="group-tab" id="tabSeries" type="button">シリーズ</button>
          </div>
        </div>
        <div class="group-panel active" id="gradeSection">
          <div class="card-grid" id="gradeGrid"></div>
        </div>
        <div class="group-panel" id="seriesSection">
          <div class="card-grid" id="seriesGrid"></div>
        </div>
      </div>

      <div class="bottom title-bottom compact-title-bottom">
        <div class="box compact-start-box">
          <div class="help compact-help">← → / ↑</div>
          <div id="loadMessage" class="help compact-help"></div>
        </div>
        <div class="box compact-button-box">
          <div class="control-list">
            <button class="control-btn" id="ctrlLeft">←</button>
            <button class="control-btn" id="ctrlRight">→</button>
            <button class="control-btn" id="ctrlConfirm">↑</button>
            <button class="control-btn" id="ctrlStart">▶</button>
          </div>
        </div>
      </div>
    </section>

    <section id="quizScreen" class="panel screen">
      <div class="quiz-main">
        <div class="stats">
          <div class="stat"><div class="stat-name">モード</div><div class="stat-value" id="statMode">1年生</div></div>
          <div class="stat"><div class="stat-name">もんだい</div><div class="stat-value" id="statProgress">1 / 15</div></div>
          <div class="stat"><div class="stat-name">せいかい</div><div class="stat-value" id="statScore">0</div></div>
          <div class="stat"><div class="stat-name">のこり時間</div><div class="stat-value" id="statTime">12.0秒</div></div>
        </div>
        <div class="box">
          <div class="timer-head">
            <span>タイマー</span>
            <span id="timerInfo">だんだん短くなります</span>
          </div>
          <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
        </div>
        <div class="question"><div class="question-text" id="questionText">問題文</div></div>
        <div class="answers">
          <button class="answer-btn maru selected" id="btnMaru"><div class="answer-symbol" id="answerSymbol1">○</div><div class="answer-label" id="answerLabel1">まる</div></button>
          <button class="answer-btn batsu" id="btnBatsu"><div class="answer-symbol" id="answerSymbol2">×</div><div class="answer-label" id="answerLabel2">ばつ</div></button>
        </div>
      </div>
      <div class="bottom">
        <div class="box">
          <div class="section-title">おしらせ</div>
          <div class="feedback" id="feedbackBox">
            <div class="feedback-main">左右で○×をえらんで、決定しよう</div>
            <div class="feedback-sub">○か×を選んでください。</div>
          </div>
        </div>
        <div class="box">
          <div class="section-title">操作ボタン</div>
          <div class="control-list">
            <button class="control-btn" data-ev="left">← 左</button>
            <button class="control-btn" data-ev="right">右 →</button>
            <button class="control-btn" data-ev="confirm">決定</button>
            <button class="control-btn" data-ev="start">次へ/開始</button>
          </div>
        </div>
      </div>
    </section>

    <section id="resultScreen" class="panel screen">
      <div class="result-main">
        <div class="box">
          <div class="section-title">けっか</div>
          <div class="score-big" id="finalScore">0 / 15</div>
          <div class="feedback-main" id="rankText">よくがんばりました！</div>
          <div class="feedback-sub" id="resultSummary"></div>
        </div>
        <div class="box" style="min-height:0;">
          <div class="section-title">ふりかえり</div>
          <div class="review-list" id="reviewList"></div>
        </div>
        <div class="box">
          <div class="control-list">
            <button class="action-btn selected" id="retryBtn">もう一度</button>
            <button class="action-btn" id="backTitleBtn">タイトルへ</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const TIMER_DECREASE = 0.2;
    const TIMER_MIN = 6.5;
    const ANSWER_DELAY = 1100;
    const BASE_TIME = {
      '学年別': 11.8,
      'シリーズ': 11.0
    };

    const state = {
      categories: [],
      selectedIndex: 0,
      activeGroup: '学年別',
      screen: 'title',
      currentCategory: null,
      questions: [],
      questionIndex: 0,
      currentQuestion: null,
      score: 0,
      review: [],
      selectedAnswer: 0,
      questionTimeLimit: 11.8,
      questionStartTime: 0,
      feedbackLock: false,
      feedbackUntil: 0,

    class InputManager {
      constructor() {
        this.mode = 'keyboard';
        this.rawKey = { left:false, right:false, confirm:false, start:false };
        this.rawGyro = { x:0, y:0 };
        this.events = [];
        this.gamepadConnected = false;
        this.padInfo = '未接続';
        this.lastPadButtons = [];
        this.lastPadDir = 0;
        this.deadzone = 0.25;
        // URLから指定されたゲームパッドインデックスを取得
        const params = new URLSearchParams(location.search);
        this.targetGamepadIndex = params.has('gamepad') ? parseInt(params.get('gamepad')) : -1;
        console.log(`🎮 ゲームパッドインデックス: ${this.targetGamepadIndex}`);
        this.bind();
      }
      bind() {
        window.addEventListener('keydown', (e) => {
          const k = e.key;
          if (['ArrowLeft','a','A'].includes(k)) this.rawKey.left = true;
          if (['ArrowRight','d','D'].includes(k)) this.rawKey.right = true;
          if (['Enter',' '].includes(k)) this.rawKey.confirm = true;
          if (k === 'Escape') this.rawKey.start = true;
        });
        window.addEventListener('keyup', (e) => {
          const k = e.key;
          if (['ArrowLeft','a','A'].includes(k)) this.rawKey.left = false;
          if (['ArrowRight','d','D'].includes(k)) this.rawKey.right = false;
          if (['Enter',' '].includes(k)) this.rawKey.confirm = false;
          if (k === 'Escape') this.rawKey.start = false;
        });
        window.addEventListener('gamepadconnected', (e) => {
          this.gamepadConnected = true;
          this.padInfo = `${e.gamepad.id} / axes:${e.gamepad.axes.length} / buttons:${e.gamepad.buttons.length}`;
        });
        window.addEventListener('gamepaddisconnected', () => {
          this.gamepadConnected = false;
          this.padInfo = '未接続';
        });
        window.addEventListener('deviceorientation', (e) => {
          const gamma = e.gamma || 0;
          const beta = e.beta || 0;
          this.rawGyro.x = Math.max(-90, Math.min(90, gamma)) / 90;
          const adjustedBeta = beta - 45;
          this.rawGyro.y = Math.max(-45, Math.min(45, adjustedBeta)) / 45;
        });
      }
      async requestGyroPermission() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
        }
      }
      pushEvent(name) { this.events.push(name); }
      consumeEvent(name) {
        const i = this.events.indexOf(name);
        if (i >= 0) { this.events.splice(i, 1); return true; }
        return false;
      }
      clearEvents(){ this.events.length = 0; }
      setMode(mode){ this.mode = mode; }
      updateKeyboardEvents() {
        if (this.rawKey.left) this.pushEvent('left');
        if (this.rawKey.right) this.pushEvent('right');
        if (this.rawKey.confirm) { this.pushEvent('confirm'); this.rawKey.confirm = false; }
        if (this.rawKey.start) { this.pushEvent('start'); this.rawKey.start = false; }
      }
      updateGamepad() {
        const pads = navigator.getGamepads ? navigator.getGamepads() : [];
        let pad = null;
        
        // 指定されたゲームパッドを優先的に使用
        if (this.targetGamepadIndex >= 0 && this.targetGamepadIndex < pads.length) {
          pad = pads[this.targetGamepadIndex];
        } else {
          // フォールバック: 最初に接続されているゲームパッドを使用
          for (const p of pads) if (p) { pad = p; break; }
        }
        if (!pad) {
          this.gamepadConnected = false;
          this.padInfo = '未接続';
          this.lastPadButtons = [];
          this.lastPadDir = 0;
          return;
        }
        this.gamepadConnected = true;
        this.padInfo = `${pad.id} / axes:${pad.axes.length} / buttons:${pad.buttons.length}`;
        let x = pad.axes[0] || 0;
        if (Math.abs(x) < this.deadzone) x = 0;
        const dir = x < -this.deadzone || pad.buttons[14]?.pressed ? -1 : x > this.deadzone || pad.buttons[15]?.pressed ? 1 : 0;
        if (dir !== 0 && dir !== this.lastPadDir) this.pushEvent(dir === -1 ? 'left' : 'right');
        this.lastPadDir = dir;
        const y = Math.abs(pad.axes[1] || 0) < this.deadzone ? 0 : (pad.axes[1] || 0);
        const confirmPressed = !!(pad.buttons[12]?.pressed || pad.buttons[0]?.pressed || pad.buttons[1]?.pressed || y < -this.deadzone);
        const startPressed = !!(pad.buttons[9]?.pressed || pad.buttons[7]?.pressed);
        if (confirmPressed && !this.lastPadButtons[0]) this.pushEvent('confirm');
        if (startPressed && !this.lastPadButtons[1]) this.pushEvent('start');
        this.lastPadButtons[0] = confirmPressed;
        this.lastPadButtons[1] = startPressed;
      }
      update() {
        this.updateKeyboardEvents();
        this.updateGamepad();
        if (this.mode === 'gyro') {
          if (this.rawGyro.x < -0.35) this.pushEvent('left');
          if (this.rawGyro.x > 0.35) this.pushEvent('right');
        }
      }
      getDebugText() {
        return [
          `mode: ${this.mode}`,
          `gamepad: ${this.gamepadConnected ? 'connected' : 'disconnected'}`,
          `padInfo: ${this.padInfo}`,
          `gyroX: ${this.rawGyro.x.toFixed(2)} / gyroY: ${this.rawGyro.y.toFixed(2)}`,
          `events: ${this.events.join(', ') || 'none'}`
        ].join('\n');
      }
    }

    const uiAudio = (() => {
      let ctx = null;
      function ensure() {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
        return ctx;
      }
      function tone(freq, duration = 0.08, type = 'triangle', gainValue = 0.04, when = 0) {
        const ac = ensure();
        const start = ac.currentTime + when;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(start);
        osc.stop(start + duration + 0.03);
      }
      return {
        unlock() { ensure(); },
        move() { tone(520, 0.05, 'triangle', 0.03); },
        decide() { tone(580, 0.05, 'square', 0.035); tone(820, 0.09, 'triangle', 0.028, 0.04); },
        start() { tone(400, 0.06, 'square', 0.04); tone(620, 0.08, 'triangle', 0.035, 0.04); tone(920, 0.12, 'triangle', 0.03, 0.08); },
        correct() { tone(660, 0.06, 'triangle', 0.045); tone(990, 0.12, 'triangle', 0.04, 0.05); },
        wrong() { tone(280, 0.16, 'sawtooth', 0.04); },
        timeout() { tone(240, 0.08, 'square', 0.03); tone(190, 0.16, 'sawtooth', 0.03, 0.06); },
        finish() { tone(660, 0.06, 'triangle', 0.04); tone(880, 0.08, 'triangle', 0.04, 0.06); tone(1320, 0.18, 'triangle', 0.03, 0.12); }
      };
    })();

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }
    
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; }
            else inQuotes = false;
          } else field += c;
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else if (c !== '\\r') field += c;
        }
      }
      if (field.length || row.length) { row.push(field); rows.push(row); }
      const header = (rows.shift() || []).map((item) => String(item).trim().toLowerCase());
      const indexOf = (name, fallback) => {
        const idx = header.indexOf(name);
        return idx >= 0 ? idx : fallback;
      };
      const hasChoices = header.includes('option1') && header.includes('option2');
      return rows.filter((r) => r.length >= 2).map((r) => {
        if (hasChoices) {
          const prompt = r[indexOf('prompt', 0)] || '';
          const option1 = r[indexOf('option1', 1)] || '';
          const option2 = r[indexOf('option2', 2)] || '';
          const answerRaw = String(r[indexOf('answer', 3)] || '1').trim();
          const correctIndex = Math.max(0, Math.min(1, Number(answerRaw) - 1));
          const explanation = r[indexOf('explanation', 4)] || '';
          return {
            type: 'choice',
            question: prompt,
            options: [option1, option2],
            correctIndex,
            explanation
          };
        }
        return {
          type: 'boolean',
          question: r[indexOf('question', 0)] || '',
          options: ['○', '×'],
          correctIndex: String(r[indexOf('answer', 1)]).trim().toLowerCase() === 'true' ? 0 : 1,
          explanation: r[indexOf('explanation', 2)] || ''
        };
      });
    }
    function answerText(question, index) {
      if (!question) return '';
      if (question.type === 'choice') return `${index + 1}. ${question.options[index]}`;
      return index === 0 ? '○' : '×';

function renderQuestion() {

function submitAnswer(answerIndex) {
  if (state.feedbackLock || state.screen !== 'quiz') return;
  state.feedbackLock = true;
  const q = state.currentQuestion;
  const ok = answerIndex === q.correctIndex;
  if (ok) state.score += 1;
  state.review.push({ q:q.question, type:q.type, options:q.options, userAnswer:answerIndex, correctAnswer:q.correctIndex, correct:ok, explanation:q.explanation });
  el.btnMaru.classList.toggle('correct', q.correctIndex === 0);
  el.btnBatsu.classList.toggle('correct', q.correctIndex === 1);
  el.btnMaru.classList.toggle('wrong', answerIndex === 0 && !ok);
  el.btnBatsu.classList.toggle('wrong', answerIndex === 1 && !ok);
  ok ? uiAudio.correct() : uiAudio.wrong();
  setFeedback(ok ? '⭕ 正解！' : '❌ ざんねん！', q.explanation);
  state.feedbackUntil = performance.now() + ANSWER_DELAY;
  renderQuestion();
}

    
function submitTimeout() {
  if (state.feedbackLock || state.screen !== 'quiz') return;
  state.feedbackLock = true;
  const q = state.currentQuestion;
  state.review.push({ q:q.question, type:q.type, options:q.options, userAnswer:null, correctAnswer:q.correctIndex, correct:false, explanation:`時間切れです。${q.explanation}` });
  el.btnMaru.classList.toggle('correct', q.correctIndex === 0);
  el.btnBatsu.classList.toggle('correct', q.correctIndex === 1);
  uiAudio.timeout();
  setFeedback('⌛ 時間切れ！', `正解は ${answerText(q, q.correctIndex)}。${q.explanation}`);
  state.feedbackUntil = performance.now() + ANSWER_DELAY + 200;
}

    document.getElementById('backTitleBtn').addEventListener('click', () => { uiAudio.decide(); showScreen('title'); updateSelection(); });
    document.body.addEventListener('click', () => { if (input.mode === 'gamepad') navigator.getGamepads?.(); }, { passive:true });

    function loop(now) {
      input.update();
      renderPadStatus();
      if (state.screen === 'title') handleTitleInput();
      if (state.screen === 'quiz') { handleQuizInput(now); renderQuizTime(now); }
      if (state.screen === 'result') handleResultInput();
      requestAnimationFrame(loop);
    }

    (async () => {
      try {
        await loadManifest();
        el.loadMessage.textContent = '↑ で開始';
      } catch (err) {
        state.loadError = String(err.message || err);
        el.loadMessage.innerHTML = `<span class="warning">../asset/manifest.json の読み込みに失敗しました。ZIPを展開後、README の方法で起動してください。<br>${state.loadError}</span>`;
      }
      renderPadStatus();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
