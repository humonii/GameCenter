<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feeling GameCenter</title>
  <style>
    :root{--bg:#0f1730;--panel:rgba(14,24,46,.9);--line:rgba(255,255,255,.12);--text:#f7fbff;--sub:#c6d8f0;--accent:#7fd3ff}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:radial-gradient(circle at top,#24456c 0%,#131d35 42%,#0b1020 100%);color:var(--text)}
    body{display:grid;place-items:center;padding:20px}
    .card{width:min(100%,760px);background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:0 28px 60px rgba(0,0,0,.32)}
    h1{margin:0 0 12px;font-size:clamp(1.6rem,4vw,2.5rem)}
    p{margin:0;color:var(--sub);line-height:1.8}
    .stack{display:grid;gap:14px;margin-top:18px}
    .note{padding:16px 18px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
    .actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:22px}
    a.button{display:inline-flex;align-items:center;justify-content:center;padding:13px 18px;border-radius:999px;text-decoration:none;font-weight:900}
    .primary{background:linear-gradient(135deg,#79d6ff,#89f1d1);color:#10203b}
    .secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text)}
    .code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#fff}
  </style>
</head>
<body>
  <div class="card">
    <h1>Feeling GameCenter</h1>
    <p id="lead">起動方法を確認しています…</p>
    <div class="stack" id="details"></div>
    <div class="actions" id="actions"></div>
  </div>
  <script>
    const lead = document.getElementById('lead');
    const details = document.getElementById('details');
    const actions = document.getElementById('actions');
    if (location.protocol !== 'file:') {
      location.replace('games/index.html');
    } else {
      lead.textContent = '完成版は起動スクリプトから開いてください。そうするとゲーム追加・削除が選択画面へ自動反映されます。';
      details.innerHTML = `
        <div class="note">Windows は <span class="code">start_game_center.bat</span>、macOS は <span class="code">start_game_center.command</span> を実行してください。</div>
        <div class="note">そのまま HTML を直接開く場合は、追加・削除の自動反映はできません。右下のボタンから <span class="code">games</span> フォルダを開いたときだけライブ反映されます。</div>`;
      actions.innerHTML = `
        <a class="button primary" href="games/index.html">このまま簡易モードで開く</a>
      `;
    }
  </script>
</body>
</html>
